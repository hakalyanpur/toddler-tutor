# fly.toml app configuration file generated for quizsprout on 2026-03-31T16:01:37-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'quizsprout'
primary_region = 'sjc'

[build]

[env]
  HOST = '0.0.0.0'
  PORT = '8080'

[[mounts]]
  source = 'quizsprout_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
