<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avyaan's Tutor</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #6366f1; --accent-l: #eef2ff; --accent-m: #a5b4fc;
    --green:  #10b981; --orange: #f59e0b; --pink: #ec4899;
    --bg: #f8fafc;
    --card-bg: #ffffff; --text: #1e293b; --text-sub: #64748b;
    --table-border: #e2e8f0; --input-bg: #f1f5f9;
    --purple: var(--accent); --purple-l: var(--accent-l); --purple-m: var(--accent-m);
  }
  [data-theme="dark"] {
    --accent: #818cf8; --accent-l: #1e1b4b; --accent-m: #4338ca;
    --green: #34d399; --orange: #fbbf24; --pink: #f472b6;
    --bg: #0f172a;
    --card-bg: rgba(30,41,59,.92); --text: #f1f5f9; --text-sub: #94a3b8;
    --table-border: #334155; --input-bg: #1e293b;
    --purple: var(--accent); --purple-l: var(--accent-l); --purple-m: var(--accent-m);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 16px;
  }
  h1, h2, .display { font-family: 'Fredoka One', cursive; }

  /* ── floating stars ── */
  .star-bg { display: none; }

  /* ── card ── */
  .card {
    position: relative; z-index: 1;
    background: var(--card-bg);
    border-radius: 24px; padding: 40px 36px; max-width: 480px; width: 100%;
    box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 32px rgba(0,0,0,.06); border: 1px solid rgba(0,0,0,.06);
    text-align: center; margin-top: 12px;
  }
  .mascot { display: none; }

  /* ── buttons ── */
  button { cursor: pointer; font-family: 'Fredoka One', cursive; border: none; transition: transform .1s, opacity .1s; }
  button:active { transform: scale(.92); }
  button:disabled { opacity: .5; cursor: not-allowed; }

  .btn-primary {
    background: var(--accent); color: #fff;
    border-radius: 12px; padding: 14px 28px; font-size: 18px;
    box-shadow: 0 2px 8px rgba(99,102,241,.25);
    transition: transform .15s, box-shadow .15s, background .15s;
  }
  .btn-primary:hover { background: #4f46e5; box-shadow: 0 4px 16px rgba(99,102,241,.35); transform: translateY(-1px); }
  .btn-mode {
    border-radius: 16px; padding: 20px 22px; color: #fff;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    font-size: 16px; min-width: 110px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    transition: transform .15s, box-shadow .15s;
  }
  .btn-mode:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.14); }
  .btn-mode .icon { font-size: 32px; }
  .btn-math   { background: #6366f1; }
  .btn-verbal { background: #10b981; }

  .btn-board  { background: #f59e0b; color: #78350f; }

  .btn-answer {
    background: var(--accent-l); border: 1.5px solid var(--accent-m);
    border-radius: 12px; padding: 14px 20px; font-size: 20px;
    color: var(--accent); min-width: 90px;
    box-shadow: 0 1px 4px rgba(0,0,0,.04);
    transition: transform .12s, background .15s, color .15s, box-shadow .15s;
  }
  .btn-answer:hover:not(:disabled) { background: var(--accent); color: #fff; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,.2); }

  .btn-back {
    position: fixed; top: 14px; left: 14px; z-index: 10;
    background: var(--card-bg); border: 1px solid rgba(0,0,0,.08);
    border-radius: 10px; padding: 8px 16px; color: var(--accent); font-size: 15px;
    box-shadow: 0 1px 4px rgba(0,0,0,.04);
  }
  .btn-theme {
    position: fixed; top: 14px; right: 14px; z-index: 10;
    background: var(--card-bg); border: 1px solid rgba(0,0,0,.08);
    border-radius: 10px; padding: 8px 14px; font-size: 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,.04);
  }

  /* ── quiz layout ── */
  .emoji-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 16px 0; }
  .big-emoji { font-size: 44px; animation: pop .3s ease both; }
  @keyframes pop { from { transform: scale(0); opacity:0 } to { transform: scale(1); opacity:1 } }

  .q-text { font-size: 22px; color: var(--text); margin: 8px 0 16px; }
  .opt-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }
  .pick-btn {
    border: 3px solid var(--purple-m); border-radius: 20px; padding: 16px 24px;
    background: var(--purple-l); cursor: pointer; display: flex;
    flex-direction: column; align-items: center; gap: 8px;
    font-family: 'Fredoka One', cursive;
    box-shadow: 0 4px 16px rgba(109,40,217,.12);
  }
  .pick-btn .pick-num { font-size: 52px; color: var(--purple); line-height:1; }
  .pick-btn:hover { background: #ddd6fe; }

  /* ── feedback ── */
  .feedback {
    font-size: 24px; font-family: 'Fredoka One', cursive;
    min-height: 40px; margin: 8px 0;
    animation: pop .3s ease both;
  }
  .feedback.ok  { color: #10b981; }
  .feedback.bad { color: #ef4444; }

  /* ── hint box ── */
  .hint-box {
    background: #fffbeb; border: 1.5px solid #fcd34d; border-radius: 12px;
    padding: 14px 20px; margin: 12px 0; font-size: 18px; color: #92400e;
    font-family: 'Nunito', sans-serif; font-weight: 700;
  }
  .btn-retry {
    background: #f59e0b; color: #fff;
    border-radius: 10px; padding: 12px 24px; font-size: 16px;
    margin-top: 10px; box-shadow: 0 2px 6px rgba(245,158,11,.2);
  }
  .btn-skip {
    background: transparent; color: var(--text-sub);
    border-radius: 10px; padding: 10px 20px; font-size: 14px;
    margin-top: 14px; display: block; margin-left: auto; margin-right: auto;
    border: 1px solid rgba(0,0,0,.08);
  }
  .btn-skip:hover { background: rgba(0,0,0,.04); }

  /* ── more/less groups ── */
  .group-row { display: flex; gap: 24px; justify-content: center; align-items: center; margin: 16px 0; }
  .group-box {
    background: var(--purple-l); border: 2.5px solid var(--purple-m);
    border-radius: 16px; padding: 16px 20px; font-size: 36px;
    cursor: pointer; min-width: 100px; text-align: center;
    transition: transform .1s;
  }
  .group-box:hover { background: #ddd6fe; transform: scale(1.05); }

  /* ── story passage ── */
  .story-passage {
    background: var(--accent-l); border: 2px solid var(--accent-m);
    border-radius: 14px; padding: 16px 20px; margin: 10px 0;
    font-size: 18px; line-height: 1.6; text-align: left;
    font-family: 'Nunito', sans-serif; color: var(--text);
  }

  /* ── score bar ── */
  .score-bar {
    display: flex; gap: 20px; justify-content: center;
    font-family: 'Fredoka One', cursive; font-size: 18px;
    color: var(--accent); margin-bottom: 12px; position: relative; z-index: 1;
    background: var(--card-bg); border-radius: 12px; padding: 8px 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04); border: 1px solid rgba(0,0,0,.06);
  }
  .streak { color: var(--orange); }

  /* ── progress / leaderboard ── */
  .progress-block { background: var(--accent-l); border-radius: 12px; padding: 14px 18px; margin: 8px 0; text-align: left; }
  .progress-block h3 { font-family: 'Fredoka One',cursive; color: var(--accent); font-size: 18px; margin-bottom: 6px; }
  .bar-wrap { background: rgba(0,0,0,.06); border-radius: 20px; height: 12px; overflow: hidden; }
  .bar-fill { background: var(--accent); height:100%; border-radius:20px; transition: width .6s ease; }

  table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--table-border); }
  th { font-family: 'Fredoka One',cursive; color: var(--purple); font-size: 16px; }
  td { font-size: 15px; color: var(--text); }
  tr:last-child td { border-bottom: none; }

  /* ── name input ── */
  input[type=text] {
    border: 1.5px solid rgba(0,0,0,.1); border-radius: 12px;
    padding: 14px 18px; font-size: 18px; font-family: 'Nunito',sans-serif; font-weight: 700;
    outline: none; background: var(--input-bg); color: var(--text); width: 100%; margin: 10px 0;
    text-align: center; transition: border-color .2s, box-shadow .2s;
  }
  input[type=text]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }

  /* ── session summary ── */
  .summary-stat {
    background: var(--accent-l); border: 1.5px solid var(--accent-m);
    border-radius: 12px; padding: 10px 16px; min-width: 80px; text-align: center;
  }
  .summary-stat-val { font-family: 'Fredoka One', cursive; font-size: 20px; color: var(--accent); }
  .summary-stat-lbl { font-size: 12px; color: var(--text-sub); font-weight: 700; text-transform: uppercase; margin-top: 2px; }
  .summary-table { width: 100%; border-collapse: collapse; margin: 12px 0 16px; }
  .summary-table th { font-family: 'Fredoka One', cursive; color: var(--accent); font-size: 13px; padding: 6px 8px; border-bottom: 2px solid var(--table-border); }
  .summary-table td { padding: 6px 8px; border-bottom: 1px solid var(--table-border); text-align: center; }
  .summary-table tr:last-child td { border-bottom: none; }

  /* ── confetti burst ── */
  .confetti-wrap { pointer-events:none; position:fixed; inset:0; z-index:999; overflow:hidden; }
  .conf { position:absolute; top:-20px; width:10px; height:10px; border-radius:2px;
    animation: conffall 1.2s ease-in forwards; }
  @keyframes conffall {
    to { transform: translateY(110vh) rotate(720deg); opacity:0; }
  }

  /* ── chalkboard tutorial ── */
  .chalkboard-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,.75); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .chalkboard {
    position: relative;
    background:
      /* chalk dust smudges */
      radial-gradient(ellipse at 20% 30%, rgba(255,255,255,.03) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 60%, rgba(255,255,255,.025) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(255,255,255,.02) 0%, transparent 40%),
      /* base green board gradient */
      linear-gradient(170deg, #1e4d35 0%, #1a3a2a 40%, #153022 100%);
    border-radius: 12px;
    max-width: 480px; width: 100%; padding: 32px 24px 22px;
    box-shadow:
      inset 0 0 60px rgba(0,0,0,.5),
      inset 0 2px 0 rgba(255,255,255,.04),
      0 8px 32px rgba(0,0,0,.5);
    max-height: 90vh; overflow-y: auto;
    /* wooden frame via layered borders + outline */
    border: 6px solid #c49a6c;
    outline: 4px solid #a07850;
    outline-offset: 0px;
  }
  /* chalk tray at bottom */
  .chalkboard::after {
    content: ''; position: absolute; bottom: -14px; left: 10%; right: 10%;
    height: 10px; background: linear-gradient(180deg, #b08860, #8a6840);
    border-radius: 0 0 4px 4px;
    box-shadow: 0 3px 6px rgba(0,0,0,.3);
  }
  /* grain/noise texture overlay */
  .chalkboard::before {
    content: ''; position: absolute; inset: 0; border-radius: 6px;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    opacity: .5; pointer-events: none; mix-blend-mode: overlay;
  }
  /* chalk dust particles */
  @keyframes chalkDrift {
    0%   { transform: translateY(0) translateX(0) scale(1); opacity: .5; }
    100% { transform: translateY(-30px) translateX(10px) scale(0); opacity: 0; }
  }
  .chalk-dust {
    position: absolute; width: 3px; height: 3px; border-radius: 50%;
    background: rgba(255,255,255,.4); pointer-events: none;
    animation: chalkDrift 2s ease-out forwards;
  }
  /* chalky text style */
  .chalk-text {
    color: rgba(255,255,255,.88);
    text-shadow:
      0 0 3px rgba(255,255,255,.15),
      1px 0 0 rgba(255,255,255,.08),
      -1px 0 0 rgba(255,255,255,.05),
      0 1px 0 rgba(255,255,255,.06);
    font-family: 'Fredoka One', cursive;
    position: relative;
  }
  .chalk-yellow {
    color: rgba(255,235,120,.9);
    text-shadow:
      0 0 4px rgba(255,235,120,.2),
      1px 0 0 rgba(255,235,120,.1),
      0 1px 0 rgba(255,235,120,.08);
  }
  .chalk-green {
    color: rgba(130,255,170,.9);
    text-shadow:
      0 0 4px rgba(130,255,170,.2),
      1px 0 0 rgba(130,255,170,.1);
  }
  .chalk-pink {
    color: rgba(255,180,200,.9);
    text-shadow:
      0 0 4px rgba(255,180,200,.2),
      1px 0 0 rgba(255,180,200,.1);
  }
  /* chalk drawn line */
  .chalk-line {
    height: 2px; margin: 10px auto;
    background: repeating-linear-gradient(90deg,
      rgba(255,255,255,.25) 0px, rgba(255,255,255,.4) 2px,
      rgba(255,255,255,.1) 4px, rgba(255,255,255,.3) 6px,
      transparent 8px, rgba(255,255,255,.2) 10px);
    border-radius: 1px;
  }
  .chalk-title {
    font-family: 'Fredoka One', cursive; font-size: 28px;
    text-align: center; margin-bottom: 12px;
    color: rgba(255,255,255,.88);
    text-shadow:
      0 0 5px rgba(255,255,255,.2),
      2px 1px 0 rgba(255,255,255,.08),
      -1px -1px 0 rgba(255,255,255,.05);
  }
  .chalk-step {
    opacity: 0; transform: translateY(16px) scale(0.97);
    transition: opacity 1.2s ease, transform 1.2s ease;
    margin: 16px 0; text-align: center;
    position: relative;
  }
  .chalk-step.visible { opacity: 1; transform: translateY(0) scale(1); }
  /* chalk writing reveal — wipes content left-to-right like being drawn */
  @keyframes chalkReveal {
    0%   { clip-path: inset(0 100% 0 0); opacity: 0.2; filter: blur(2px); }
    30%  { opacity: 0.6; filter: blur(1px); }
    100% { clip-path: inset(0 0% 0 0); opacity: 1; filter: blur(0); }
  }
  .chalk-write {
    opacity: 0;
  }
  .chalk-step.visible .chalk-write {
    animation: chalkReveal 1.8s ease-out forwards;
  }
  .chalk-step.visible .chalk-write-slow {
    animation: chalkReveal 3s ease-out forwards;
  }
  /* chalk stroke for SVG drawn lines */
  @keyframes chalkStroke {
    to { stroke-dashoffset: 0; }
  }
  .chalk-svg-line {
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
  }
  .chalk-step.visible .chalk-svg-line {
    animation: chalkStroke 2s ease-out forwards;
  }
  /* Chalk character-by-character writing for equations */
  @keyframes chalkCharAppear {
    0%   { opacity: 0; transform: translateY(4px) rotate(-3deg); filter: blur(2px); }
    50%  { opacity: 0.6; filter: blur(0.5px); }
    100% { opacity: 1; transform: translateY(0) rotate(0); filter: blur(0); }
  }
  .chalk-char {
    display: inline-block; opacity: 0;
    animation: chalkCharAppear 0.4s ease-out forwards;
  }
  /* big visual elements */
  .chalk-big-emoji { font-size: 44px; display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; margin: 8px 0; }
  .chalk-big-emoji span { display: inline-block; animation: chalkPop .3s ease both; }
  @keyframes chalkPop { from { transform: scale(0) rotate(-10deg); } to { transform: scale(1) rotate(0); } }
  .chalk-big-num {
    font-family: 'Fredoka One', cursive; font-size: 52px; text-align: center;
    color: rgba(255,235,120,.9);
    text-shadow: 0 0 8px rgba(255,235,120,.25), 2px 1px 0 rgba(255,235,120,.1);
  }
  .chalk-equation {
    font-family: 'Fredoka One', cursive; font-size: 40px; text-align: center;
    color: rgba(255,255,255,.9);
    text-shadow: 0 0 6px rgba(255,255,255,.2), 2px 1px 0 rgba(255,255,255,.08);
    margin: 8px 0;
  }
  .chalk-equation .chalk-op { color: rgba(255,235,120,.85); padding: 0 6px; }
  .chalk-equation .chalk-ans { color: rgba(130,255,170,.9);
    text-shadow: 0 0 8px rgba(130,255,170,.3); }
  /* dots for counting */
  .chalk-dots { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 8px 0; }
  .chalk-dot {
    width: 32px; height: 32px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.95), rgba(200,195,180,.7));
    box-shadow: 0 0 4px rgba(255,255,255,.2), inset 0 -2px 4px rgba(0,0,0,.1);
    display: inline-block;
  }
  .chalk-dot.group-b {
    background: radial-gradient(circle at 35% 35%, rgba(255,240,140,.95), rgba(230,200,80,.7));
    box-shadow: 0 0 4px rgba(255,235,120,.3), inset 0 -2px 4px rgba(0,0,0,.1);
  }
  .chalk-dot.borrowed {
    background: radial-gradient(circle at 35% 35%, rgba(255,200,210,.95), rgba(230,150,170,.7));
    box-shadow: 0 0 4px rgba(255,180,200,.3);
  }
  /* number line */
  .chalk-number-line {
    display: flex; align-items: flex-end; justify-content: center; gap: 0;
    margin: 8px 0; position: relative;
  }
  .chalk-tick {
    width: 40px; text-align: center; font-family: 'Fredoka One', cursive;
    font-size: 22px; padding-bottom: 6px;
    color: rgba(255,255,255,.7);
    border-bottom: 2px solid rgba(255,255,255,.3);
    text-shadow: 0 0 3px rgba(255,255,255,.15);
  }
  .chalk-tick.active {
    color: rgba(255,235,120,.95); font-size: 28px;
    border-bottom: 3px solid rgba(255,235,120,.6);
    text-shadow: 0 0 6px rgba(255,235,120,.3);
  }
  .chalk-tick.landed {
    color: rgba(130,255,170,.95); font-size: 28px;
    border-bottom: 3px solid rgba(130,255,170,.6);
    text-shadow: 0 0 6px rgba(130,255,170,.3);
  }
  .chalk-hop-row { display: flex; justify-content: center; gap: 0; margin-bottom: 2px; }
  .chalk-hop-cell {
    width: 40px; text-align: center; font-family: 'Fredoka One', cursive;
    font-size: 13px; color: rgba(255,235,120,.8);
    text-shadow: 0 0 3px rgba(255,235,120,.2);
  }
  /* ten frame */
  .chalk-ten-frame {
    display: grid; grid-template-columns: repeat(5, 40px); gap: 4px;
    justify-content: center; margin: 10px 0;
  }
  .chalk-ten-cell {
    width: 40px; height: 40px;
    border: 2px solid rgba(255,255,255,.3);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  /* bond circles - now with actual drawn circles */
  .chalk-bond { text-align: center; margin: 10px 0; position: relative; }
  .chalk-bond-circle {
    display: inline-flex; align-items: center; justify-content: center;
    width: 64px; height: 64px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,.5);
    font-family: 'Fredoka One', cursive; font-size: 28px;
    box-shadow: 0 0 6px rgba(255,255,255,.1);
  }
  .chalk-bond-circle.top { color: rgba(255,235,120,.9); border-color: rgba(255,235,120,.5); }
  .chalk-bond-circle.bottom { color: rgba(130,255,170,.9); border-color: rgba(130,255,170,.5); }
  .chalk-bond-arms-svg { display: block; margin: -4px auto; }
  /* blocks for tens */
  .chalk-blocks { display: flex; gap: 8px; justify-content: center; margin: 8px 0; }
  .chalk-block-group { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .chalk-block-stack { display: flex; gap: 2px; }
  .chalk-block {
    width: 12px; height: 32px; border-radius: 3px;
    background: repeating-linear-gradient(180deg,
      rgba(255,255,255,.5) 0px, rgba(255,255,255,.3) 2px,
      rgba(255,255,255,.5) 4px);
    box-shadow: 0 0 3px rgba(255,255,255,.15);
  }
  .chalk-block.orange {
    background: repeating-linear-gradient(180deg,
      rgba(255,200,100,.6) 0px, rgba(255,200,100,.3) 2px,
      rgba(255,200,100,.6) 4px);
    box-shadow: 0 0 3px rgba(255,200,100,.2);
  }
  /* pattern arrows */
  .chalk-arrow-row {
    display: flex; align-items: center; justify-content: center; gap: 0; margin: 10px 0;
    font-family: 'Fredoka One', cursive; flex-wrap: wrap;
  }
  .chalk-arrow-num {
    font-size: 32px; padding: 0 3px;
    color: rgba(255,255,255,.85);
    text-shadow: 0 0 4px rgba(255,255,255,.15);
  }
  .chalk-arrow-num.unknown { color: rgba(255,235,120,.9);
    text-shadow: 0 0 6px rgba(255,235,120,.25); }
  .chalk-arrow-label {
    font-size: 14px; text-align: center;
    display: flex; flex-direction: column; align-items: center; padding: 0 1px;
    color: rgba(130,255,170,.85);

<body>

<script>
// ── theme toggle ──────────────────────────────────────────────────────────
(function() {
  const saved = localStorage.getItem("theme");
  if(saved === "dark") {
    document.documentElement.setAttribute("data-theme", "dark");
    document.getElementById("themeBtn").textContent = "☀️";
  }
})();
function toggleTheme() {
  const isDark = document.documentElement.getAttribute("data-theme") === "dark";
  if(isDark) {
    document.documentElement.removeAttribute("data-theme");
    document.getElementById("themeBtn").textContent = "🌙";
    localStorage.setItem("theme", "light");
  } else {
    document.documentElement.setAttribute("data-theme", "dark");
    document.getElementById("themeBtn").textContent = "☀️";
    localStorage.setItem("theme", "dark");
  }
}

// ── state ──────────────────────────────────────────────────────────────────
let playerName = "Avyaan";
let questions  = [];
let qIndex     = 0;
let sessionCorrect = 0;
let sessionTotal   = 0;
let streak = 0;
let wrongCount = 0;       // how many wrong attempts on current question
let currentHint = "";     // hint for current question
let currentCorrect = "";  // correct answer for current question
let sessionStartTime = null;   // when the current round started
let questionStartTime = null;  // when the current question was shown
let questionResults = [];      // [{question, correct, timeMs, type}] for summary

// ── stars ──────────────────────────────────────────────────────────────────
(function() {
  const bg = document.getElementById("starBg");
  const stars = ["⭐","🌟","✨","💫"];
  for(let i=0;i<12;i++){
    const s = document.createElement("div");
    s.className = "star";
    s.textContent = stars[i%stars.length];
    s.style.left = `${(i*17+7)%100}%`;
    s.style.top  = `${(i*23+5)%100}%`;
    s.style.animationDelay = `${i*0.28}s`;
    s.style.fontSize = `${12+i%10}px`;
    bg.appendChild(s);
  }
})();

// ── screens ────────────────────────────────────────────────────────────────
function show(id) {
  ["screenName","screenHome","screenQuiz","screenBoard"].forEach(s=>
    document.getElementById(s).classList.add("hidden")
  );
  document.getElementById(id).classList.remove("hidden");
}

function goHome() {
  document.getElementById("backBtn").classList.add("hidden");
  document.getElementById("scoreBar").classList.add("hidden");
  show("screenHome");
}

// ── name is hardcoded ──────────────────────────────────────────────────────

// ── start mode ─────────────────────────────────────────────────────────────
async function startMode(mode) {
  sessionCorrect = 0; sessionTotal = 0; streak = 0; qIndex = 0; wrongCount = 0;
  sessionStartTime = Date.now(); questionResults = [];
  updateScoreBar();
  document.getElementById("feedback").textContent = "";
  document.getElementById("backBtn").classList.remove("hidden");
  document.getElementById("scoreBar").classList.remove("hidden");
  show("screenQuiz");
  const res = await fetch(`/api/questions/${mode}?player_name=${encodeURIComponent(playerName)}`);
  questions = await res.json();
  questions._mode = mode;
  renderQuestion();
}

// ── score bar ──────────────────────────────────────────────────────────────
function updateScoreBar() {
  document.getElementById("scoreLabel").textContent = `⭐ ${sessionCorrect} correct`;
  const sl = document.getElementById("streakLabel");
  if(streak >= 3) { sl.textContent = `🔥 ${streak} streak!`; sl.classList.remove("hidden"); }
  else sl.classList.add("hidden");
}

// ── helper: escape HTML for safe rendering ─────────────────────────────────
function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ── render question ────────────────────────────────────────────────────────
function renderQuestion() {
  if(qIndex >= questions.length) { showSummary(); return; }
  const q = questions[qIndex];
  const area = document.getElementById("questionArea");

  if(q.type === "addition" || q.type === "subtraction") {

      <p class="q-text">${esc(q.question)}</p>

        `<button class="btn-answer" onclick="checkAnswer('${o}','${q.answer}','${q.id}')" style="font-size:24px;padding:14px 22px">${o}</button>`

  } else if(q.type === "bigger") {
    currentCorrect = String(Math.max(q.a, q.b));

  } else if(q.type === "time") {

      ).join("")}</div>`;

  } else if(q.type === "money") {
    currentCorrect = q.answer;
    area.innerHTML = `
      <div style="font-size:64px;margin:8px 0">${q.emoji}</div>

  } else if(q.type === "rhyme") {

    area.innerHTML = `
      <p class="q-text">${q.emoji} What rhymes with <b>${esc(q.word)}</b>?</p>
      <div class="opt-row">${q.options.map(o=>
        `<button class="btn-answer" onclick="checkAnswer('${esc(o)}','${esc(q.answer)}','${q.id}')">${esc(o)}</button>`
      ).join("")}</div>`;

  } else if(q.type === "sight_word") {
    currentCorrect = q.answer;
    area.innerHTML = `
      <div style="font-size:72px;margin:8px 0">${q.emoji}</div>
      <p class="q-text">Which word says <b>${esc(q.word).toUpperCase()}</b>?</p>

    area.innerHTML = `
      <div style="font-size:72px;margin:8px 0">${q.emoji}</div>

      ).join("")}</div>`;

  } else if(q.type === "sentence") {
    currentCorrect = q.answer;
    area.innerHTML = `
      <p class="q-text" style="font-size:28px">${esc(q.sentence)}</p>
      <div class="opt-row">${q.options.map(o=>
        `<button class="btn-answer" onclick="checkAnswer('${esc(o)}','${esc(q.answer)}','${q.id}')" style="font-size:22px;padding:14px 22px;text-transform:lowercase;font-family:'Nunito',sans-serif;font-weight:800">${esc(o)}</button>`
      ).join("")}</div>`;

  } else if(q.type === "word") {
    currentCorrect = q.answer;
    area.innerHTML = `
      <p class="q-text">${esc(q.question)}</p>
      <div class="opt-row">${q.options.map(o=>
        `<button class="btn-answer" onclick="checkAnswer('${esc(o)}','${esc(q.answer)}','${q.id}')" style="font-size:18px;padding:14px 18px">${esc(o)}</button>`
      ).join("")}</div>`;

  } else if(q.type === "sound") {
    currentCorrect = q.answer;
    area.innerHTML = `
      <div style="font-size:72px;margin:8px 0">${q.emoji}</div>
      <p class="q-text">${esc(q.question)}</p>
      <div class="opt-row">${q.options.map(o=>
        `<button class="btn-answer" onclick="checkAnswer('${esc(o)}','${esc(q.answer)}','${q.id}')" style="font-size:20px;padding:14px 20px">${esc(o)}</button>`
      ).join("")}</div>`;

  } else if(q.type === "opposite") {
    currentCorrect = q.answer;
    area.innerHTML = `
      <div style="font-size:56px;margin:8px 0">${q.emoji}</div>
      <p class="q-text">What is the <b>opposite</b> of <b>${esc(q.word)}</b>?</p>
      <div class="opt-row">${q.options.map(o=>
        `<button class="btn-answer" onclick="checkAnswer('${esc(o)}','${esc(q.answer)}','${q.id}')" style="font-size:20px;padding:14px 20px;text-transform:capitalize">${esc(o)}</button>`
      ).join("")}</div>`;

  } else if(q.type === "color") {
    currentCorrect = q.answer;

      <div style="font-size:72px;margin:8px 0">${q.emoji}</div>

      <div class="opt-row">${q.options.map(o=>

function skipQuestion() {
  qIndex++;
  renderQuestion();
}

function makeArithOpts(answer, qid) {
  const pool = new Set([answer]);
  while(pool.size < 4) {
    const offset = Math.floor(Math.random()*5)+1;
    const candidate = answer + (Math.random()<0.5 ? offset : -offset);
    if(candidate >= 0) pool.add(candidate);
  }
  return [...pool].sort((a,b)=>a-b).map(v=>
    `<button class="btn-answer" onclick="checkAnswer('${v}','${answer}','${qid}')" style="font-size:28px;padding:16px 24px">${v}</button>`
  ).join("");
}

function makePatternOpts(answer, qid) {
  const pool = new Set([answer]);
  while(pool.size < 4) pool.add(answer + (Math.floor(Math.random()*6)-3));
  return [...pool].filter(v=>v>0).sort((a,b)=>a-b).map(v=>
    `<button class="btn-answer" onclick="checkAnswer('${v}','${answer}','${qid}')">${v}</button>`
  ).join("");
}

// ── check answer (with hint on first wrong, reveal on second) ─────────────
async function checkAnswer(given, correct, qid) {
  const isOk = String(given) === String(correct);
  const mode = questions._mode;

  if(!isOk && wrongCount === 0) {
    // First wrong: auto-open tutorial to teach the method
    wrongCount = 1;
    document.querySelectorAll("#questionArea button, #questionArea .group-box").forEach(b=>b.style.pointerEvents="none");

    const fb = document.getElementById("feedback");
    fb.textContent = "Let's learn how! 📖";
    fb.className = "feedback bad";
    playSound("wrong");

    // Record wrong attempt
    fetch("/api/answer", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({player_name: playerName, mode, question_id: qid, correct: false})
    });

    // Auto-open chalkboard tutorial after brief pause
    setTimeout(() => {
      _tutorialAutoRetry = true;
      showTutorial();
    }, 800);
    return;
  }

  // Either correct, or second wrong attempt
  const qTimeMs = Date.now() - questionStartTime;
  sessionTotal++;
  if(isOk) { sessionCorrect++; streak++; confetti(); }
  else streak = 0;
  updateScoreBar();
  questionResults.push({
    question: questions[qIndex].display || questions[qIndex].question || questions[qIndex].word || questions[qIndex].sentence || questions[qIndex].object || `Q${qIndex+1}`,
    type: questions[qIndex].type,
    correct: isOk,
    timeMs: qTimeMs
  });

  // disable all buttons
  document.querySelectorAll("#questionArea button, #questionArea .group-box").forEach(b=>{b.disabled=true; b.style.pointerEvents="none";});

  const fb = document.getElementById("feedback");
  const res = await fetch("/api/answer", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({player_name: playerName, mode, question_id: qid, correct: isOk})
  });
  const data = await res.json();

  if(isOk) {
    fb.textContent = data.message;
    fb.className = "feedback ok";
    playSound("correct");
  } else {
    fb.textContent = `The answer is: ${currentCorrect}`;
    fb.className = "feedback bad";
    playSound("wrong");
    // Add "Learn why" button for optional re-study
    const area = document.getElementById("questionArea");
    area.innerHTML += `<button class="btn-learn" onclick="showTutorial()" style="margin-top:8px">📖 Learn why</button>`;
  }

  setTimeout(()=>{ qIndex++; renderQuestion(); }, 3000);
}

// ── retry after hint ──────────────────────────────────────────────────────
function retryQuestion() {
  // Re-render the same question (wrongCount stays 1 so next wrong = reveal)
  wrongCount = 1;
  const q = questions[qIndex];
  document.getElementById("feedback").textContent = "";
  // Re-render fully
  const saveWrong = wrongCount;
  renderQuestion();
  wrongCount = saveWrong; // preserve that we already had one wrong
}

function formatTime(ms) {
  const totalSec = Math.round(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  return min > 0 ? `${min}m ${sec}s` : `${sec}s`;
}

// ── sound effects (Web Audio API) ─────────────────────────────────────────
let _audioCtx = null;
function getAudioCtx() {
  if(!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}

function playSound(type) {
  const ctx = getAudioCtx();
  const now = ctx.currentTime;

  if(type === "correct") {
    // Cheerful ascending two-tone chime
    [0, 0.15].forEach((delay, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = i === 0 ? 523.25 : 659.25; // C5 → E5
      gain.gain.setValueAtTime(0.3, now + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.3);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now + delay);
      osc.stop(now + delay + 0.3);
    });
  } else if(type === "wrong") {
    // Gentle descending tone
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(330, now);       // E4
    osc.frequency.linearRampToValueAtTime(220, now + 0.3); // → A3
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.35);
  }
}

    6:"🖐️☝️", 7:"🖐️✌️", 8:"🖐️🤟", 9:"🖐️🖖", 10:"🖐️🖐️" };
  return hands[n] || `${n}`;
}

// Chalk writing sound — longer scratchy sound like chalk on board
function playChalkWrite(duration) {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const dur = duration || 0.4;
    const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t = i / ctx.sampleRate;
      // Scratchy noise with volume envelope
      const env = Math.min(1, t * 20) * Math.max(0, 1 - t / dur);
      const scratch = (Math.random() * 2 - 1) * 0.5;
      // Periodic scrape feel like chalk dragging
      const scrape = Math.sin(t * 600 + Math.sin(t * 80) * 6) * 0.25;
      data[i] = (scratch + scrape) * env;
    }
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g = ctx.createGain();
    g.gain.value = 0.25;
    const hp = ctx.createBiquadFilter();
    hp.type = "highpass"; hp.frequency.value = 600;
    const lp = ctx.createBiquadFilter();
    lp.type = "lowpass"; lp.frequency.value = 5000;
    src.connect(hp).connect(lp).connect(g).connect(ctx.destination);
    src.start(now);
  } catch(e) {}
}

// Teacher voice narration using Web Speech API — slow & warm
function chalkSpeak(text) {
  if (!text || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 0.72;   // slow — toddler-friendly pace
  utter.pitch = 1.15;  // warm, friendly
  utter.volume = 0.9;
  // Try to pick a friendly voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => /samantha|karen|victoria|fiona|moira/i.test(v.name))
    || voices.find(v => v.lang.startsWith("en") && /female/i.test(v.name))
    || voices.find(v => v.lang.startsWith("en"));
  if (preferred) utter.voice = preferred;
  speechSynthesis.speak(utter);
}

function showTutorial() {
  const q = questions[qIndex];
  const el = document.getElementById("chalkContent");
  const builder = tutorialBuilders[q.type];
  if (!builder) return;
  el.innerHTML = builder(q);
  const overlay = document.getElementById("chalkOverlay");
  overlay.classList.remove("hidden");

  // Preload voices (some browsers need this)
  if (window.speechSynthesis) speechSynthesis.getVoices();

  const board = overlay.querySelector(".chalkboard");
  spawnChalkDust(board, 8);

  // Animate steps in one at a time — slower pace
  const steps = el.querySelectorAll(".chalk-step");
  let i = 0;
  function revealStep(idx) {
    if (idx >= steps.length) return;
    steps[idx].classList.add("visible");
    playChalkWrite(0.8);
    spawnChalkDust(board, 3);
    // Speak the data-speak attribute if present
    const speech = steps[idx].getAttribute("data-speak");
    if (speech) chalkSpeak(speech);
  }

  if (steps.length) revealStep(0);
  i = 1;
  _tutorialInterval = setInterval(() => {
    if (i >= steps.length) { clearInterval(_tutorialInterval); _tutorialInterval = null; return; }
    revealStep(i);
    i++;
  }, 3500);
}

function replayTutorial() {
  // Stop current animation & speech, then restart
  if (_tutorialInterval) { clearInterval(_tutorialInterval); _tutorialInterval = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
  // Reset all steps to hidden
  document.querySelectorAll("#chalkContent .chalk-step").forEach(s => s.classList.remove("visible"));
  // Restart after brief pause
  setTimeout(() => showTutorial(), 300);
}

function closeTutorial() {
  document.getElementById("chalkOverlay").classList.add("hidden");
  if (_tutorialInterval) { clearInterval(_tutorialInterval); _tutorialInterval = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
  // If auto-opened on wrong answer, re-render question for retry
  if (_tutorialAutoRetry) {
    _tutorialAutoRetry = false;
    retryQuestion();
  }
}

function buildTutorialSubtraction(q) {
  const a = q.a, b = q.b, ans = q.answer;
  const method = q.method || "count_back";
  const eA = "🍎";

  function eq(a, op, b, result) {
    const parts = [`${a}`, ` ${op} `, `${b}`, ` = `, `${result}`];
    const classes = ['', 'chalk-op', '', 'chalk-op', 'chalk-ans'];
    let html = '', delay = 0;
    parts.forEach((part, pi) => {
      for (const ch of part) {
        if (ch === ' ') { html += ' '; continue; }
        html += `<span class="chalk-char ${classes[pi]}" style="animation-delay:${delay.toFixed(2)}s">${ch}</span>`;
        delay += 0.18;
      }
    });
    return `<div class="chalk-equation">${html}</div>`;
  }

  if (method === "count_back") {
    const start = Math.min(a + 1, a), end = Math.max(0, ans - 1);
    let ticks = "";
    for (let n = end; n <= start; n++) {
      const cls = n === a ? "active" : n === ans ? "landed" : "";
      ticks += `<div class="chalk-tick ${cls}">${n}</div>`;
    }
    let hops = "";
    for (let n = end; n <= start; n++) {
      hops += `<div class="chalk-hop-cell">${(n >= ans && n < a) ? "⌒" : ""}</div>`;
    }
    const countWords = Array.from({length: b}, (_, i) => a - i - 1).join(", ");
    return `
      <div class="chalk-title chalk-text">🔢 🐸</div>
      <div class="chalk-line" style="width:60%"></div>
      <div class="chalk-step" data-speak="We start at ${a}">
        <div class="chalk-big-num chalk-write">${a}</div>
        <div class="chalk-big-emoji">${makeEmoji(Math.min(a, 12), eA)}</div>
      </div>
      <div class="chalk-step" data-speak="Now hop BACK ${b} times! ${countWords}!">
        <div class="chalk-big-emoji" style="font-size:36px">${"🐸 ".repeat(b)}</div>
        <div class="chalk-hop-row chalk-write">${hops}</div>
        <div class="chalk-number-line chalk-write-slow">${ticks}</div>
      </div>
      <div class="chalk-step" data-speak="${a} minus ${b} equals ${ans}!">
        ${eq(a, "−", b, ans)}
        <div style="font-size:48px">🎉</div>
      </div>`;
  }

  if (method === "number_bonds") {
    return `
      <div class="chalk-title chalk-text">🔗 Find the missing part!</div>
      <div class="chalk-line" style="width:60%"></div>
      <div class="chalk-step" data-speak="The whole is ${a}. One part is ${b}. What is the missing part?">
        <div class="chalk-bond">
          <div class="chalk-bond-circle top">${a}</div>
          <svg class="chalk-bond-arms-svg" width="140" height="40" viewBox="0 0 140 40">
            <line class="chalk-svg-line" x1="50" y1="4" x2="20" y2="36" stroke="rgba(255,255,255,.5)" stroke-width="2.5"/>
            <line class="chalk-svg-line" x1="90" y1="4" x2="120" y2="36" stroke="rgba(255,255,255,.5)" stroke-width="2.5" style="animation-delay:.3s"/>
          </svg>
          <div style="display:flex;justify-content:center;gap:40px">
            <div class="chalk-bond-circle bottom">${b}</div>
            <div class="chalk-bond-circle bottom chalk-green">?</div>
          </div>
        </div>
      </div>
      <div class="chalk-step" data-speak="${b} and ${ans} make ${a}! So the missing part is ${ans}!">
        <div class="chalk-bond">
          <div class="chalk-bond-circle top">${a}</div>
          <svg class="chalk-bond-arms-svg" width="140" height="40" viewBox="0 0 140 40">
            <line class="chalk-svg-line" x1="50" y1="4" x2="20" y2="36" stroke="rgba(255,255,255,.5)" stroke-width="2.5"/>
            <line class="chalk-svg-line" x1="90" y1="4" x2="120" y2="36" stroke="rgba(255,255,255,.5)" stroke-width="2.5"/>
          </svg>
          <div style="display:flex;justify-content:center;gap:40px">
            <div class="chalk-bond-circle bottom">${b}</div>
            <div class="chalk-bond-circle bottom chalk-green">${ans}</div>
          </div>
        </div>
      </div>
      <div class="chalk-step" data-speak="${a} minus ${b} equals ${ans}!">
        ${eq(a, "−", b, ans)}
        <div style="font-size:48px">🎉</div>
      </div>`;
  }

  if (method === "bridge_10") {
    const toTen = a - 10;
    const remainder = b - toTen;
    return `
      <div class="chalk-title chalk-text">🌉 Bridge through 10!</div>
      <div class="chalk-line" style="width:60%"></div>
      <div class="chalk-step" data-speak="Start at ${a}. First hop to 10!">
        <div class="chalk-text chalk-yellow chalk-write" style="font-size:24px">${a} − ${toTen} = 10</div>
        ${buildTenFrame(10)}
      </div>
      <div class="chalk-step" data-speak="Now subtract ${remainder} more from 10!">
        <div class="chalk-text chalk-yellow chalk-write" style="font-size:24px">10 − ${remainder} = ${ans}</div>
        ${buildTenFrame(ans)}
      </div>
      <div class="chalk-step" data-speak="${a} minus ${b} equals ${ans}!">
        ${eq(a, "−", b, ans)}
        <div style="font-size:48px">🎉</div>
      </div>`;
  }

  if (method === "doubles") {
    return `
      <div class="chalk-title chalk-text">🪞</div>
      <div class="chalk-line" style="width:60%"></div>
      <div class="chalk-step" data-speak="Double ${ans} is ${a}! ${ans} plus ${ans} equals ${a}">
        <div style="display:flex;align-items:center;justify-content:center;gap:16px">
          <div class="chalk-big-emoji">${makeEmoji(Math.min(ans, 8), eA)}</div>
          <span class="chalk-divider">|</span>
          <div class="chalk-big-emoji">${makeEmoji(Math.min(ans, 8), eA)}</div>
        </div>
        <div class="chalk-text chalk-yellow chalk-write" style="font-size:24px;margin-top:6px">${ans} 🪞 ${ans} = ${a}</div>
      </div>
      <div class="chalk-step" data-speak="Take away one side! ${a} minus ${b} equals ${ans}!">
        <div style="display:flex;align-items:center;justify-content:center;gap:16px">
          <div class="chalk-big-emoji">${makeEmoji(Math.min(ans, 8), eA)}</div>
          <span class="chalk-divider">|</span>
          <div class="chalk-big-emoji" style="opacity:0.2;text-decoration:line-through">${makeEmoji(Math.min(b, 8), eA)}</div>
        </div>
      </div>
      <div class="chalk-step" data-speak="${a} minus ${b} equals ${ans}!">
        ${eq(a, "−", b, ans)}
        <div style="font-size:48px">🎉</div>
      </div>`;
  }

  // Fallback
  return `
    <div class="chalk-title chalk-text">➖</div>
    <div class="chalk-line" style="width:60%"></div>
    <div class="chalk-step" data-speak="We have ${a}">
      <div class="chalk-big-emoji">${makeEmoji(Math.min(a, 15), eA)}</div>
      <div class="chalk-big-num chalk-write">${a}</div>
    </div>
    <div class="chalk-step" data-speak="Take away ${b}">
      <div class="chalk-text chalk-pink chalk-write" style="font-size:24px">Take away ${b}!</div>
      <div class="chalk-big-emoji" style="opacity:0.3">${makeEmoji(Math.min(b, 15), eA)}</div>
    </div>
    <div class="chalk-step" data-speak="${a} minus ${b} equals ${ans}!">
      ${eq(a, "−", b, ans)}
      <div style="font-size:48px">🎉</div>
    </div>`;
}

function buildTutorialShape(q) {
  const shapes3d = { sphere: "round in EVERY direction like a ball", cube: "like a box with 6 flat faces", cylinder: "like a can — two circles and a tube", cone: "pointy on top, round on the bottom" };
  const shapes2d = { triangle: "3 sides and 3 corners", circle: "perfectly round, no corners", square: "4 equal sides and 4 square corners", rectangle: "4 sides — 2 long and 2 short", oval: "like a stretched circle", diamond: "4 sides, standing on a point" };
  const info = shapes3d[q.answer] || shapes2d[q.answer] || q.description;

function buildTutorialNumberOrder(q) {
  const ans = q.answer;
  const nums = [];
  for (let n = Math.max(0, ans - 3); n <= ans + 3; n++) nums.push(n);
  const ticks = nums.map(n => `<div class="chalk-tick ${n === ans ? 'landed' : ''}">${n}</div>`).join("");
  return `
    <div class="chalk-title chalk-text">🔢</div>
    <div class="chalk-line" style="width:60%"></div>
    <div class="chalk-step" data-speak="${q.question}">

    </div>
    <div class="chalk-step" data-speak="Look at the number line!">
      <div class="chalk-number-line chalk-write-slow">${ticks}</div>

    <div class="chalk-step" data-speak="The answer is ${ans}!">
      <div class="chalk-big-num chalk-write chalk-green">${ans}</div>

}

function buildTutorialPhonics(q) {
  if (q.subtype === "blending") {

    return `

      <div class="chalk-line" style="width:60%"></div>
      <div class="chalk-step" data-speak="Let's sound out each letter. ${letters.join('... ')}">
        <div style="display:flex;gap:32px;justify-content:center;font-size:48px;font-family:'Fredoka One',cursive" class="chalk-text chalk-write">
          ${letters.map(l => `<span>${l}</span>`).join("")}
        </div>
        <div style="font-size:36px;margin-top:8px">🤖</div>
      </div>
      <div class="chalk-step" data-speak="Now push them together! ${q.answer}!">
        <div style="display:flex;gap:4px;justify-content:center;font-size:48px;font-family:'Fredoka One',cursive" class="chalk-text chalk-green chalk-write">
          ${letters.map(l => `<span>${l}</span>`).join("")}
        </div>
        <div class="chalk-text chalk-yellow chalk-write" style="font-size:28px;margin-top:8px">→ ${q.answer}!</div>
      </div>
      <div class="chalk-step" data-speak="${q.answer}! Great job!">
        <div class="chalk-text chalk-green chalk-write" style="font-size:36px">${q.answer}! ${q.emoji || ''}</div>
        <div style="font-size:48px">🎉</div>
      </div>`;
  }

  const letter = q.answer.charAt(0).toLowerCase();
  const jp = JOLLY_PHONICS[letter];
  if (jp) {
    return `
      <div class="chalk-title chalk-text" style="font-size:64px">${letter.toUpperCase()}</div>
      <div class="chalk-line" style="width:60%"></div>
      <div class="chalk-step" data-speak="This letter says ${q.answer}!">
        <div class="chalk-text chalk-write" style="font-size:56px">${letter.toUpperCase()} ${letter}</div>
        <div class="chalk-text chalk-yellow chalk-write" style="font-size:24px;margin-top:8px">says "${q.answer}"</div>
      </div>
      <div class="chalk-step" data-speak="${jp.action}">
        <div style="font-size:48px">${jp.emoji}</div>
        <div class="chalk-text chalk-pink chalk-write" style="font-size:20px">${esc(jp.action)}</div>
      </div>
      <div class="chalk-step" data-speak="${letter.toUpperCase()} is for ${jp.words.join(' and ')}!">
        <div class="chalk-text chalk-green chalk-write" style="font-size:22px">${jp.words.map(w => `<span style="font-size:20px">${w}</span>`).join(" · ")}</div>
        <div style="font-size:48px">🎉</div>
      </div>`;
  }

  return `
    <div class="chalk-title chalk-text" style="font-size:64px">${q.emoji}</div>
    <div class="chalk-line" style="width:60%"></div>
    <div class="chalk-step" data-speak="${q.hint}">
      <div class="chalk-text chalk-yellow chalk-write" style="font-size:22px">${esc(q.hint)}</div>
    </div>
    <div class="chalk-step" data-speak="The answer is ${q.answer}!">
      <div class="chalk-text chalk-green chalk-write" style="font-size:32px">${esc(q.answer)}</div>
      <div style="font-size:48px">🎉</div>
    </div>`;
}

      <div style="font-size:72px">${q.emoji}</div>
    </div>
    <div class="chalk-step" data-speak="It says ${q.answer}!">
      <div style="font-size:56px">${q.emoji}</div>

}

// ── Addition tutorial builders (visual + speech + chalk-write) ───────

function buildTutorialAddition(q) {
  const a = q.a, b = q.b, ans = q.answer;
  const method = q.method || "count_on";
  const eA = "🍎", eB = "🍊";

  // Helper: chalk-written equation — each character appears like being drawn
  function eq(a, op, b, result) {
    const parts = [`${a}`, ` ${op} `, `${b}`, ` = `, `${result}`];
    const classes = ['', 'chalk-op', '', 'chalk-op', 'chalk-ans'];
    let html = '', delay = 0;
    parts.forEach((part, pi) => {
      for (const ch of part) {
        if (ch === ' ') { html += ' '; continue; }
        html += `<span class="chalk-char ${classes[pi]}" style="animation-delay:${delay.toFixed(2)}s">${ch}</span>`;
        delay += 0.18;
      }
    });
    return `<div class="chalk-equation">${html}</div>`;
  }

  if (method === "count_on") {
    const bigger = Math.max(a, b), smaller = Math.min(a, b);
    const start = Math.max(0, bigger - 1), end = ans + 1;
    let ticks = "";
    for (let n = start; n <= end; n++) {
      const cls = n === bigger ? "active" : n === ans ? "landed" : "";
      ticks += `<div class="chalk-tick ${cls}">${n}</div>`;
    }
    let hops = "";
    for (let n = start; n <= end; n++) {
      hops += `<div class="chalk-hop-cell">${(n >= bigger && n < ans) ? "⌒" : ""}</div>`;
    }
    // Count narration: "5, 6, 7!"
    const countWords = Array.from({length: smaller}, (_, i) => bigger + i + 1).join(", ");
    return `
      <div class="chalk-title chalk-text">🔢 🐸</div>
      <div class="chalk-line" style="width:60%"></div>
      <div class="chalk-step" data-speak="We start at ${bigger}">
        <div class="chalk-big-num chalk-write">${bigger}</div>
        <div class="chalk-big-emoji">${makeEmoji(bigger, eA)}</div>
      </div>
      <div class="chalk-step" data-speak="Now jump ${smaller} times! ${countWords}!">
        <div class="chalk-big-emoji" style="font-size:36px">${"🐸 ".repeat(smaller)}</div>
        <div class="chalk-hop-row chalk-write">${hops}</div>
        <div class="chalk-number-line chalk-write-slow">${ticks}</div>
      </div>
      <div class="chalk-step" data-speak="${a} plus ${b} equals ${ans}!">
        ${eq(a, "+", b, ans)}
        <div style="font-size:48px">🎉</div>
      </div>`;
  }

  if (method === "count_all") {
    const countWords = Array.from({length: ans}, (_, i) => i + 1).join(", ");
    return `
      <div class="chalk-title chalk-text">${eA} + ${eB}</div>
      <div class="chalk-line" style="width:60%"></div>
      <div class="chalk-step" data-speak="Here are ${a} apples">
        <div class="chalk-big-emoji">${makeEmoji(a, eA)}</div>
        <div class="chalk-big-num chalk-write">${a}</div>
      </div>
      <div class="chalk-step" data-speak="And ${b} oranges">
        <div class="chalk-big-emoji">${makeEmoji(b, eB)}</div>
        <div class="chalk-big-num chalk-write">${b}</div>
      </div>
      <div class="chalk-step" data-speak="Now let's count them all! ${countWords}!">
        <div class="chalk-big-emoji">${makeEmoji(a, eA)} ${makeEmoji(b, eB)}</div>
        <div class="chalk-text chalk-yellow chalk-write" style="font-size:22px;margin-top:6px">${Array.from({length:ans},(_,i)=>`<span style="animation-delay:${i*0.15}s;display:inline-block;animation:chalkPop .3s ease both">${i+1}</span>`).join(" ")}</div>
      </div>
      <div class="chalk-step" data-speak="${a} plus ${b} equals ${ans}! Great job!">
        ${eq(a, "+", b, ans)}
        <div style="font-size:48px">🎉</div>
      </div>`;
  }

  if (method === "doubles") {
    const n = Math.min(a, b);
    return `
      <div class="chalk-title chalk-text">🪞</div>
      <div class="chalk-line" style="width:60%"></div>
      <div class="chalk-step" data-speak="${n} on this side, and ${n} on that side. They're the same!">
        <div style="display:flex;align-items:center;justify-content:center;gap:16px">
          <div class="chalk-big-emoji">${makeEmoji(n, eA)}</div>
          <span class="chalk-divider">|</span>
          <div class="chalk-big-emoji">${makeEmoji(n, eA)}</div>
        </div>
        <div class="chalk-text chalk-yellow chalk-write" style="font-size:24px;margin-top:6px">${n} 🪞 ${n}</div>
      </div>
      <div class="chalk-step" data-speak="Double ${n} is ${ans}!">
        ${eq(a, "+", b, ans)}
        <div style="font-size:48px">🎉</div>
      </div>`;
  }

  if (method === "number_bond") {
    return `
      <div class="chalk-title chalk-text">🔗</div>
      <div class="chalk-line" style="width:60%"></div>
      <div class="chalk-step" data-speak="${a} and ${b} are best friends! Together they make ${ans}">
        <div class="chalk-bond">
          <div class="chalk-bond-circle top">${ans}</div>
          <svg class="chalk-bond-arms-svg" width="140" height="40" viewBox="0 0 140 40">
            <line class="chalk-svg-line" x1="50" y1="4" x2="20" y2="36" stroke="rgba(255,255,255,.5)" stroke-width="2.5"/>
            <line class="chalk-svg-line" x1="90" y1="4" x2="120" y2="36" stroke="rgba(255,255,255,.5)" stroke-width="2.5" style="animation-delay:.3s"/>
          </svg>
          <div style="display:flex;justify-content:center;gap:40px">
            <div class="chalk-bond-circle bottom">${a}</div>
            <div class="chalk-bond-circle bottom">${b}</div>
          </div>
        </div>
      </div>
      <div class="chalk-step" data-speak="See? ${a} apples and ${b} oranges">
        <div class="chalk-big-emoji">${makeEmoji(Math.min(a,12), eA)} <span style="font-size:32px">➕</span> ${makeEmoji(Math.min(b,12), eB)}</div>
      </div>
      <div class="chalk-step" data-speak="${a} plus ${b} equals ${ans}!">
        ${eq(a, "+", b, ans)}
        <div style="font-size:48px">🎉</div>
      </div>`;
  }

  if (method === "make_10") {
    // Simple visual: show both groups, move some over to make 10, show leftover
    // e.g. 9+6: show 9 apples & 6 oranges → move 1 orange to apples → 10 + 5 = 15
    const bigger = Math.max(a, b), smaller = Math.min(a, b);
    const borrow = 10 - bigger;  // how many to move over
    const leftover = smaller - borrow;

    // Step 1: show the two groups side by side
    // Step 2: show the borrow — apples get bigger, oranges get smaller, with arrow
    // Step 3: 10 + leftover = answer

    return `
      <div class="chalk-title chalk-text">🔟</div>
      <div class="chalk-line" style="width:60%"></div>
      <div class="chalk-step" data-speak="${bigger} apples, and ${smaller} oranges">
        <div style="display:flex;align-items:center;justify-content:center;gap:14px">
          <div><div class="chalk-big-emoji">${makeEmoji(bigger, eA)}</div><div class="chalk-text chalk-yellow chalk-write" style="font-size:24px">${bigger}</div></div>
          <div class="chalk-plus-sign chalk-write" style="font-size:28px">+</div>
          <div><div class="chalk-big-emoji">${makeEmoji(smaller, eB)}</div><div class="chalk-text chalk-yellow chalk-write" style="font-size:24px">${smaller}</div></div>
        </div>
      </div>
      <div class="chalk-step" data-speak="Move ${borrow} over to make 10!">
        <div style="display:flex;align-items:center;justify-content:center;gap:14px">
          <div><div class="chalk-big-emoji">${makeEmoji(bigger, eA)}${makeEmoji(borrow, eB)}</div><div class="chalk-text chalk-green chalk-write" style="font-size:28px">🔟</div></div>
          <div class="chalk-plus-sign chalk-write" style="font-size:28px">+</div>
          <div><div class="chalk-big-emoji">${makeEmoji(leftover, eB)}</div><div class="chalk-text chalk-yellow chalk-write" style="font-size:24px">${leftover}</div></div>
        </div>
      </div>
      <div class="chalk-step" data-speak="10 plus ${leftover} equals ${ans}!">
        ${eq(a, "+", b, ans)}
        <div style="font-size:48px">🎉</div>
      </div>`;
  }

  if (method === "add_tens") {
    const tensA = Math.round(a / 10), tensB = Math.round(b / 10);
    let blocksA = "", blocksB = "";
    for (let i = 0; i < tensA; i++) blocksA += `<div class="chalk-block-group"><div class="chalk-block-stack"><div class="chalk-block"></div></div></div>`;
    for (let i = 0; i < tensB; i++) blocksB += `<div class="chalk-block-group"><div class="chalk-block-stack"><div class="chalk-block orange"></div></div></div>`;
    return `
      <div class="chalk-title chalk-text">🧱</div>
      <div class="chalk-line" style="width:60%"></div>
      <div class="chalk-step" data-speak="${tensA} tens, that's ${a}">
        <div class="chalk-blocks">${blocksA}</div>
        <div class="chalk-text chalk-yellow chalk-write" style="font-size:28px">${a}</div>
      </div>
      <div class="chalk-step" data-speak="Plus ${tensB} tens, that's ${b}">
        <div class="chalk-plus-sign chalk-write">+</div>
        <div class="chalk-blocks">${blocksB}</div>
        <div class="chalk-text chalk-yellow chalk-write" style="font-size:28px">${b}</div>
      </div>
      <div class="chalk-step" data-speak="${a} plus ${b} equals ${ans}!">
        ${eq(a, "+", b, ans)}
        <div style="font-size:48px">🎉</div>
      </div>`;
  }

  if (method === "add_to_10") {
    const fingers = (b <= 10) ? fingerEmoji(b) : b;
    return `
      <div class="chalk-title chalk-text">🔟 ➕</div>
      <div class="chalk-line" style="width:60%"></div>
      <div class="chalk-step" data-speak="We have ${a}">
        <div class="chalk-big-num chalk-write">${a}</div>
        <div style="font-size:40px">${fingerEmoji(Math.min(a, 10))}</div>
      </div>
      <div class="chalk-step" data-speak="Plus ${b} more!">
        <div class="chalk-plus-sign chalk-write">+</div>
        <div class="chalk-big-num chalk-write">${b}</div>
        <div style="font-size:40px">${typeof fingers === 'string' && fingers.length > 3 ? fingers : `<span style="font-size:48px">${fingers}</span>`}</div>
      </div>
      <div class="chalk-step" data-speak="${a} plus ${b} equals ${ans}!">
        ${eq(a, "+", b, ans)}
        <div style="font-size:48px">🎉</div>
      </div>`;
  }

  // Fallback
  return `
    <div class="chalk-title chalk-text">➕</div>
    <div class="chalk-line" style="width:60%"></div>
    <div class="chalk-step" data-speak="Here are ${a}">
      <div class="chalk-big-emoji">${makeEmoji(Math.min(a, 15), eA)}</div>
      <div class="chalk-big-num chalk-write">${a}</div>
    </div>
    <div class="chalk-step" data-speak="Plus ${b} more">
      <div class="chalk-plus-sign chalk-write">+</div>
      <div class="chalk-big-emoji">${makeEmoji(Math.min(b, 15), eB)}</div>
      <div class="chalk-big-num chalk-write">${b}</div>
    </div>
    <div class="chalk-step" data-speak="${a} plus ${b} equals ${ans}!">
      ${eq(a, "+", b, ans)}
      <div style="font-size:48px">🎉</div>
    </div>`;
}

// ── Pattern tutorial builders (visual + speech + chalk-write) ────────

function buildTutorialPattern(q) {
  const seq = (q.seq || []).filter(v => v !== null && v !== undefined);
  const ans = q.answer;

  if (seq.length < 2) {
    return `<div class="chalk-title chalk-text">🔢</div>
      <div class="chalk-step" data-speak="The answer is ${ans}!"><div class="chalk-big-num chalk-write">${ans}</div><div style="font-size:48px">🎉</div></div>`;
  }

  const diffs = [];
  for (let i = 1; i < seq.length; i++) diffs.push(seq[i] - seq[i - 1]);
  const allSameDiff = diffs.every(d => d === diffs[0]);

  const ratios = [];
  for (let i = 1; i < seq.length; i++) ratios.push(seq[i] / seq[i - 1]);
  const allDouble = seq[0] !== 0 && ratios.every(r => r === 2);

  let isFib = seq.length >= 3;
  for (let i = 2; i < seq.length; i++) {
    if (seq[i] !== seq[i - 1] + seq[i - 2]) { isFib = false; break; }
  }

  const seqWithAnswer = [...seq, ans];
  const seqStr = seq.join(", ");

  // Check constant difference FIRST — it's the most common and simplest pattern.
  // Must come before fibonacci, since sequences like 10,20,30 pass both checks
  // (10+20=30) but are clearly "+10" not fibonacci.
  if (allSameDiff) {
    const d = diffs[0];
    const sign = d >= 0 ? "+" : "";
    const word = d >= 0 ? "plus" : "minus";
    let arrows = "";
    for (let i = 0; i < seqWithAnswer.length; i++) {
      const isLast = i === seqWithAnswer.length - 1;
      arrows += `<span class="chalk-arrow-num ${isLast ? 'unknown' : ''}">${seqWithAnswer[i]}</span>`;
      if (i < seqWithAnswer.length - 1) {
        arrows += `<span class="chalk-arrow-label"><span class="arrow-line">→</span><span class="chalk-green">${sign}${d}</span></span>`;
      }
    }
    const jumpEmoji = d > 0 ? "🐸" : "🦘";
    return `
      <div class="chalk-title chalk-text chalk-write">${sign}${d} ${sign}${d} ${sign}${d}</div>
      <div class="chalk-line" style="width:60%"></div>
      <div class="chalk-step" data-speak="${seqStr}. See the pattern? We jump ${word} ${Math.abs(d)} every time!">
        <div class="chalk-arrow-row chalk-write-slow">${arrows}</div>
      </div>
      <div class="chalk-step" data-speak="${word} ${Math.abs(d)}!">
        <div style="font-size:40px">${jumpEmoji}</div>
        <div class="chalk-text chalk-green chalk-write" style="font-size:22px">${sign}${d}</div>
      </div>
      <div class="chalk-step" data-speak="${seq[seq.length-1]} ${word} ${Math.abs(d)} equals ${ans}!">
        <div class="chalk-equation chalk-write"><span>${seq[seq.length-1]}</span> <span class="chalk-op">${d>=0?"+":"−"}</span> <span>${Math.abs(d)}</span> <span class="chalk-op">=</span> <span class="chalk-ans">${ans}</span></div>
        <div style="font-size:48px">🎉</div>
      </div>`;
  }

  if (allDouble) {
    let arrows = "";
    for (let i = 0; i < seqWithAnswer.length; i++) {
      const isLast = i === seqWithAnswer.length - 1;
      arrows += `<span class="chalk-arrow-num ${isLast ? 'unknown' : ''}">${seqWithAnswer[i]}</span>`;
      if (i < seqWithAnswer.length - 1) {
        arrows += `<span class="chalk-arrow-label"><span class="arrow-line">→</span>×2</span>`;
      }
    }
    return `
      <div class="chalk-title chalk-text">×2 ×2 ×2</div>
      <div class="chalk-line" style="width:60%"></div>
      <div class="chalk-step" data-speak="${seqStr}. Each number doubles!">
        <div class="chalk-arrow-row chalk-write-slow">${arrows}</div>
      </div>
      <div class="chalk-step" data-speak="Times 2 every time!">
        <div style="font-size:36px">🐰🐰</div>
        <div class="chalk-text chalk-yellow chalk-write" style="font-size:20px">×2</div>
      </div>
      <div class="chalk-step" data-speak="${seq[seq.length-1]} times 2 is ${ans}!">
        <div class="chalk-equation chalk-write"><span>${seq[seq.length-1]}</span> <span class="chalk-op">×</span> <span>2</span> <span class="chalk-op">=</span> <span class="chalk-ans">${ans}</span></div>
        <div style="font-size:48px">🎉</div>
      </div>`;
  }

  if (isFib && seq.length >= 3) {
    const s1 = seq[seq.length - 2], s2 = seq[seq.length - 1];
    return `
      <div class="chalk-title chalk-text">➕ ➕</div>
      <div class="chalk-line" style="width:60%"></div>
      <div class="chalk-step" data-speak="${seqStr}, what comes next?">
        <div class="chalk-arrow-row chalk-write-slow">${seq.map(n => `<span class="chalk-arrow-num">${n}</span>`).join('<span class="chalk-arrow-label"><span class="arrow-line">,</span></span>')}<span class="chalk-arrow-num unknown">❓</span></div>
      </div>
      <div class="chalk-step" data-speak="Add the last two! ${s1} plus ${s2}">
        <div style="display:flex;align-items:center;justify-content:center;gap:10px">
          <div class="chalk-bond-circle bottom" style="width:52px;height:52px;font-size:24px">${s1}</div>
          <span class="chalk-plus-sign chalk-write" style="font-size:28px">+</span>
          <div class="chalk-bond-circle bottom" style="width:52px;height:52px;font-size:24px">${s2}</div>
        </div>
      </div>
      <div class="chalk-step" data-speak="${s1} plus ${s2} equals ${ans}!">
        <div class="chalk-equation chalk-write"><span>${s1}</span> <span class="chalk-op">+</span> <span>${s2}</span> <span class="chalk-op">=</span> <span class="chalk-ans">${ans}</span></div>
        <div style="font-size:48px">🎉</div>
      </div>`;
  }

  // Fallback
  let arrows = "";
  for (let i = 0; i < seq.length; i++) {
    arrows += `<span class="chalk-arrow-num">${seq[i]}</span>`;
    if (i < seq.length - 1) {
      const d = diffs[i];
      arrows += `<span class="chalk-arrow-label"><span class="arrow-line">→</span>${d>=0?"+":""}${d}</span>`;
    }
  }
  arrows += `<span class="chalk-arrow-label"><span class="arrow-line">→</span>?</span><span class="chalk-arrow-num unknown">${ans}</span>`;
  return `
    <div class="chalk-title chalk-text">🔢 ❓</div>
    <div class="chalk-line" style="width:60%"></div>
    <div class="chalk-step" data-speak="${seqStr}, what comes next?"><div class="chalk-arrow-row chalk-write-slow">${arrows}</div></div>
    <div class="chalk-step" data-speak="It's ${ans}!">
      <div class="chalk-big-num chalk-write">${ans}</div>
      <div style="font-size:48px">🎉</div>
    </div>`;
}
</script>
